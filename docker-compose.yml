version: "3.9"

services:
  db:
    image: mongo:7
    container_name: rbn-mongo
    restart: unless-stopped
    volumes:
      - ./mongo_data:/data/db

  ingestor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rbn-ingestor
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "3000:3000"
